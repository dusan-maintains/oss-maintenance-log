name: Evidence Daily Update

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Git Identity
        run: |
          git config user.name "dusan-maintains-bot"
          git config user.email "action@users.noreply.github.com"

      - name: Update Evidence Snapshot
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/update-evidence.ps1
          ./scripts/update-ecosystem-status.ps1
          ./scripts/update-review-sla.ps1
          ./scripts/update-review-sla.ps1 -Repo jquery-tablesort -PrNumbers 49 -OutBaseName review-sla-tablesort
          ./scripts/update-review-sla.ps1 -Owner extrabacon -Repo python-shell -PrNumbers 320 -OutBaseName review-sla-python-shell
          ./scripts/update-review-sla.ps1 -Owner jkbrzt -Repo rrule -PrNumbers 664 -OutBaseName review-sla-rrule
          ./scripts/update-review-sla.ps1 -Owner Hellenic -Repo react-hexgrid -PrNumbers 123 -OutBaseName review-sla-react-hexgrid
          ./scripts/update-review-sla.ps1 -Owner lingdojo -Repo kana-dojo -PrNumbers 6309 -OutBaseName review-sla-kana-dojo
          ./scripts/update-review-sla.ps1 -Owner grafana -Repo grafana -PrNumbers 119212 -OutBaseName review-sla-grafana
          ./scripts/update-action-queue.ps1

      - name: Commit and Push Changes
        run: |
          git add evidence/*.json evidence/*.md
          if git diff --cached --quiet; then
            echo "No evidence changes to commit."
            exit 0
          fi

          git commit -m "chore(evidence): daily automated snapshot"
          git push
