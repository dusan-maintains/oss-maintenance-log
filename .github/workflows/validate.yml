name: Validate Repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate configuration and scripts
        shell: pwsh
        run: ./scripts/validate-repo.ps1

  test-pester:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/"
          $config.Run.PassThru = $true
          $config.Output.Verbosity = "Detailed"
          $results = Invoke-Pester -Configuration $config
          if ($results.FailedCount -gt 0) { exit 1 }

  test-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run CLI unit tests
        working-directory: cli
        run: npm test

      - name: Verify CLI runs
        working-directory: cli
        run: node bin/scan.js --version
