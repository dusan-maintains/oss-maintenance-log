<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSS Maintenance Log — Live Dashboard</title>
<meta name="description" content="One maintainer keeping 1.6M npm downloads/week alive. Public, auto-updating evidence log for OSS maintenance work across 7 packages.">
<meta property="og:title" content="OSS Maintenance Log — 1.6M npm downloads/week kept alive">
<meta property="og:description" content="Automated public evidence log: forks, PRs, SLA tracking across 7 abandoned-but-critical packages. Self-updates every 6 hours via GitHub Actions.">
<meta property="og:url" content="https://dusan-maintains.github.io/oss-maintenance-log">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="OSS Maintenance Log — 1.6M npm downloads/week kept alive">
<meta name="twitter:description" content="Automated public evidence log: forks, PRs, SLA tracking across 7 abandoned-but-critical packages. Self-updates every 6 hours via GitHub Actions.">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { border-bottom: 1px solid var(--border); padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header .subtitle { color: var(--muted); font-size: 0.875rem; }
  .gh-link { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 0.875rem; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .gh-link:hover { background: var(--border); text-decoration: none; }

  main { max-width: 1100px; margin: 0 auto; padding: 32px; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-card .value { font-size: 1.75rem; font-weight: 700; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.blue { color: var(--blue); }
  .stat-card .value.purple { color: var(--purple); }
  .stat-card .value.yellow { color: var(--yellow); }

  section { margin-bottom: 40px; }
  section h2 { font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
  .badge.merged { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.open { background: rgba(88,166,255,0.15); color: var(--blue); }
  .badge.wanted { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge.gap { background: rgba(248,81,73,0.15); color: var(--red); }

  .num { font-variant-numeric: tabular-nums; }
  .updated { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  .loading { color: var(--muted); font-size: 0.875rem; padding: 20px 0; }
  .error { color: var(--red); font-size: 0.875rem; padding: 20px 0; }

  footer { border-top: 1px solid var(--border); padding: 24px 32px; text-align: center; color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <div>
    <h1>OSS Maintenance Log</h1>
    <div class="subtitle">Live dashboard — auto-updated every 6 hours</div>
  </div>
  <a class="gh-link" href="https://github.com/dusan-maintains/oss-maintenance-log" target="_blank">
    ★ Star on GitHub
  </a>
</header>

<main>
  <div class="stats-grid" id="stats">
    <div class="stat-card"><div class="label">Packages Tracked</div><div class="value blue" id="s-packages">—</div></div>
    <div class="stat-card"><div class="label">npm Downloads / Week</div><div class="value green" id="s-downloads">—</div></div>
    <div class="stat-card"><div class="label">Combined Stars</div><div class="value yellow" id="s-stars">—</div></div>
    <div class="stat-card"><div class="label">Open PRs</div><div class="value purple" id="s-prs">—</div></div>
  </div>

  <section>
    <h2>Tracked Packages</h2>
    <div id="packages-table"><div class="loading">Loading...</div></div>
  </section>

  <section>
    <h2>Action Queue</h2>
    <div id="queue-table"><div class="loading">Loading...</div></div>
  </section>
</main>

<footer>
  Data sourced from <a href="https://github.com/dusan-maintains/oss-maintenance-log/tree/main/evidence">evidence/</a> — updated automatically via GitHub Actions.
  <div class="updated" id="last-updated"></div>
</footer>

<script>
const RAW = 'https://raw.githubusercontent.com/dusan-maintains/oss-maintenance-log/main/evidence/';

function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return String(n);
}

function statusBadge(s) {
  if (!s) return '';
  const sl = s.toLowerCase();
  if (sl.includes('merged')) return '<span class="badge merged">✓ Merged</span>';
  if (sl.includes('wanted')) return '<span class="badge wanted">⚠ Maintainers Wanted</span>';
  if (sl.includes('gap') || sl.includes('backlog')) return '<span class="badge gap">✗ Maintainer Gap</span>';
  return '<span class="badge open">● Open</span>';
}

async function load() {
  try {
    const [eco, queue] = await Promise.all([
      fetch(RAW + 'ecosystem-status.json').then(r => r.json()),
      fetch(RAW + 'action-queue.json').then(r => r.json()).catch(() => null)
    ]);

    // Stats
    const repos = eco.repos || [];
    const totalDownloads = repos.reduce((a, r) => a + (r.npm_weekly_downloads || 0), 0);
    const totalStars = repos.reduce((a, r) => a + (r.stars || 0), 0);
    const totalPRs = repos.reduce((a, r) => a + (r.open_prs || 0), 0);

    document.getElementById('s-packages').textContent = repos.length;
    document.getElementById('s-downloads').textContent = fmt(totalDownloads);
    document.getElementById('s-stars').textContent = fmt(totalStars);
    document.getElementById('s-prs').textContent = totalPRs;

    if (eco.generated_at) {
      document.getElementById('last-updated').textContent = 'Last updated: ' + new Date(eco.generated_at).toUTCString();
    }

    // Packages table
    const pkgHtml = `<table>
      <thead><tr><th>Package</th><th>Stars</th><th>npm/week</th><th>Open Issues</th><th>Last Push</th><th>Status</th></tr></thead>
      <tbody>${repos.map(r => `<tr>
        <td><a href="https://github.com/${r.owner || ''}/${r.repo || r.name}" target="_blank">${r.owner || ''}/${r.repo || r.name}</a></td>
        <td class="num">${fmt(r.stars || 0)}</td>
        <td class="num">${fmt(r.npm_weekly_downloads || 0)}</td>
        <td class="num">${r.open_issues || 0}</td>
        <td>${r.last_push ? r.last_push.slice(0,10) : '—'}</td>
        <td>${statusBadge(r.status || '')}</td>
      </tr>`).join('')}</tbody>
    </table>`;
    document.getElementById('packages-table').innerHTML = pkgHtml;

    // Queue
    if (queue && queue.items && queue.items.length) {
      const qHtml = `<table>
        <thead><tr><th>Repo</th><th>PR</th><th>Priority</th><th>Days Open</th><th>Action</th></tr></thead>
        <tbody>${queue.items.map(q => `<tr>
          <td>${q.repo || '—'}</td>
          <td>${q.pr ? `<a href="${q.pr_url || '#'}" target="_blank">#${q.pr}</a>` : '—'}</td>
          <td>${q.priority || '—'}</td>
          <td class="num">${q.days_open || '—'}</td>
          <td>${q.action || '—'}</td>
        </tr>`).join('')}</tbody>
      </table>`;
      document.getElementById('queue-table').innerHTML = qHtml;
    } else {
      document.getElementById('queue-table').innerHTML = '<div class="loading">No pending actions.</div>';
    }

  } catch (e) {
    document.getElementById('packages-table').innerHTML = '<div class="error">Failed to load data. ' + e.message + '</div>';
  }
}

load();
</script>
</body>
</html>
