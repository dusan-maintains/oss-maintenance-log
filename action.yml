name: "OSS Maintenance Evidence Log"
description: "Automatically track OSS package health, PR SLA, health scores, and npm stats. Config-driven — just edit tracked-repositories.json."
author: "dusan-maintains"

branding:
  icon: "activity"
  color: "green"

inputs:
  github-token:
    description: "GitHub token for API access (use secrets.GITHUB_TOKEN)"
    required: true
  config-file:
    description: "Workspace-relative path to tracked-repositories.json config file"
    required: false
    default: "config/tracked-repositories.json"
  evidence-dir:
    description: "Workspace-relative directory to write evidence files into"
    required: false
    default: "evidence"
  compute-health-scores:
    description: "Whether to compute health scores after evidence collection"
    required: false
    default: "true"

outputs:
  health-json:
    description: "Path to generated health-scores.json"
    value: ${{ steps.evidence.outputs.health-json }}
  manifest-json:
    description: "Path to generated manifest.json"
    value: ${{ steps.evidence.outputs.manifest-json }}
  critical-count:
    description: "Number of packages with critical health scores (<30)"
    value: ${{ steps.evidence.outputs.critical-count }}
  avg-health:
    description: "Average health score across all tracked packages"
    value: ${{ steps.evidence.outputs.avg-health }}

runs:
  using: "composite"
  steps:
    - name: Update All Evidence
      id: evidence
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OSS_MAINTENANCE_LOG_WORKSPACE_ROOT: ${{ github.workspace }}
      run: |
        $actionRoot = "${{ github.action_path }}"
        $workspaceRoot = "${{ github.workspace }}"

        $evidenceDirInput = "${{ inputs.evidence-dir }}"
        $configFileInput = "${{ inputs.config-file }}"

        if ([System.IO.Path]::IsPathRooted($evidenceDirInput)) {
          throw "evidence-dir must be workspace-relative so generated README links stay valid."
        }

        $dir = Join-Path $workspaceRoot $evidenceDirInput

        $cfg = if ([System.IO.Path]::IsPathRooted($configFileInput)) {
          $configFileInput
        } else {
          Join-Path $workspaceRoot $configFileInput
        }

        $scriptArgs = @(
          "-OutDir", $dir,
          "-ConfigPath", $cfg,
          "-ReadmePath", "README.md",
          "-EvidencePathPrefix", $evidenceDirInput
        )

        if ("${{ inputs.compute-health-scores }}" -eq "false") {
          $scriptArgs += "-SkipHealthScoring"
        }

        & (Join-Path $actionRoot "scripts/update-all-evidence.ps1") @scriptArgs

        # Export outputs for downstream steps
        $healthPath = Join-Path $dir "health-scores.json"
        $manifestPath = Join-Path $dir "manifest.json"

        "health-json=$healthPath" >> $env:GITHUB_OUTPUT
        "manifest-json=$manifestPath" >> $env:GITHUB_OUTPUT

        if (Test-Path $healthPath) {
          $health = Get-Content $healthPath -Raw | ConvertFrom-Json
          $scores = @($health.scores | Where-Object { $null -ne $_.health_score })
          $critical = @($scores | Where-Object { $_.health_score -lt 30 }).Count
          $avg = if ($scores.Count -gt 0) {
            [math]::Round(($scores | Measure-Object -Property health_score -Average).Average, 1)
          } else { 0 }

          "critical-count=$critical" >> $env:GITHUB_OUTPUT
          "avg-health=$avg" >> $env:GITHUB_OUTPUT
        } else {
          "critical-count=0" >> $env:GITHUB_OUTPUT
          "avg-health=0" >> $env:GITHUB_OUTPUT
        }
