name: "OSS Maintenance Evidence Log"
description: "Automatically track OSS package health, PR SLA, health scores, and npm stats. Config-driven — just edit tracked-repositories.json."
author: "dusan-maintains"

branding:
  icon: "activity"
  color: "green"

inputs:
  github-token:
    description: "GitHub token for API access (use secrets.GITHUB_TOKEN)"
    required: true
  config-file:
    description: "Path to tracked-repositories.json config file"
    required: false
    default: "config/tracked-repositories.json"
  evidence-dir:
    description: "Directory to write evidence files into"
    required: false
    default: "evidence"
  compute-health-scores:
    description: "Whether to compute health scores after evidence collection"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Update All Evidence
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        $dir = "${{ inputs.evidence-dir }}"
        $cfg = "${{ inputs.config-file }}"
        ./scripts/update-all-evidence.ps1 -OutDir $dir -ConfigPath $cfg

    - name: Compute Health Scores
      if: ${{ inputs.compute-health-scores == 'true' }}
      shell: pwsh
      run: |
        $dir = "${{ inputs.evidence-dir }}"
        $cfg = "${{ inputs.config-file }}"
        ./scripts/compute-health-scores.ps1 -OutDir $dir -ConfigPath $cfg

    - name: Compute Trends
      if: ${{ inputs.compute-health-scores == 'true' }}
      shell: pwsh
      run: |
        $dir = "${{ inputs.evidence-dir }}"
        ./scripts/compute-trends.ps1 -OutDir $dir

    - name: Check Alerts
      if: ${{ inputs.compute-health-scores == 'true' }}
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        $dir = "${{ inputs.evidence-dir }}"
        ./scripts/check-alerts.ps1 -OutDir $dir

